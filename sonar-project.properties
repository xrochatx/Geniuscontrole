# ============================================================================
# GeniusControle - SonarQube Configuration
# Análisis estático de calidad para Java (backend) y Python (scraper)
# ============================================================================

# Identificación del proyecto
sonar.projectKey=geniuscontrole
sonar.projectName=GeniusControle - Web Scraping Seguro
sonar.projectVersion=1.0.0

# Organización de módulos
sonar.modules=backend,scraper

# ---------------------------------------------------------------------------
# Módulo Backend (Java / Spring Boot)
# ---------------------------------------------------------------------------
backend.sonar.projectName=Backend API
backend.sonar.projectBaseDir=backend
backend.sonar.sources=src/main/java
backend.sonar.tests=src/test/java
backend.sonar.java.binaries=target/classes
backend.sonar.java.test.binaries=target/test-classes
backend.sonar.java.libraries=target/dependency/*.jar
backend.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones de análisis
backend.sonar.exclusions=**/dto/**,**/config/**

# ---------------------------------------------------------------------------
# Módulo Scraper (Python)
# ---------------------------------------------------------------------------
scraper.sonar.projectName=Motor de Scraping
scraper.sonar.projectBaseDir=scraper
scraper.sonar.sources=.
scraper.sonar.language=py
scraper.sonar.python.version=3.11
scraper.sonar.python.coverage.reportPaths=coverage.xml

# Exclusiones de análisis
scraper.sonar.exclusions=**/tests/**,**/__pycache__/**,*.pyc

# ---------------------------------------------------------------------------
# Configuración general de calidad
# ---------------------------------------------------------------------------
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
