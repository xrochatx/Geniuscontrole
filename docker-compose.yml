# ============================================================================
# GeniusControle - Docker Compose
# Servicios: MongoDB 7.0, Redis 7.2, Selenium Standalone Chrome
# Autor: Juan Rochat - Proyecto de Titulación
# ============================================================================

version: '3.9'

services:
  # --------------------------------------------------------------------------
  # MongoDB 7.0 — Almacenamiento principal de catálogos JSON
  # --------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: geniuscontrole-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: geniusadmin
      MONGO_INITDB_ROOT_PASSWORD: G3n1u5S3cur3P@ss
      MONGO_INITDB_DATABASE: geniuscontrole
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - geniuscontrole-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Seguridad: limitar recursos del contenedor
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # --------------------------------------------------------------------------
  # Redis 7.2 — Caché de consultas y gestión de sesiones/rate-limiting
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: geniuscontrole-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Contraseña + límite de memoria + política de evicción LRU
    command: >
      redis-server
      --requirepass R3d1sS3cur3P@ss
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - geniuscontrole-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "R3d1sS3cur3P@ss", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # --------------------------------------------------------------------------
  # Selenium Standalone Chrome — Renderizado de contenido dinámico (JS)
  # --------------------------------------------------------------------------
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: geniuscontrole-selenium
    restart: unless-stopped
    ports:
      - "4444:4444"    # WebDriver HTTP
      - "7900:7900"    # noVNC para visualización (debug)
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_SESSION_REQUEST_TIMEOUT=300
    shm_size: '2gb'
    networks:
      - geniuscontrole-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

# ---------------------------------------------------------------------------
# Volúmenes persistentes
# ---------------------------------------------------------------------------
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Red interna aislada
# ---------------------------------------------------------------------------
networks:
  geniuscontrole-net:
    driver: bridge
    name: geniuscontrole-net
