$kind: http-request
description: |-
  Lista todos los productos con paginación.
  Parámetros: page (0-indexed), size (max 100), sortBy, direction.
url: "{{baseUrl}}/api/v1/products?page=0&size=10&sortBy=name&direction=asc"
method: GET
queryParams:
  page: "0"
  size: "10"
  sortBy: name
  direction: asc
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Has pagination headers', function () {
          pm.expect(pm.response.headers.has('X-Total-Count')).to.be.true;
          pm.expect(pm.response.headers.has('X-Page-Number')).to.be.true;
      });

      pm.test('Response has content array', function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('content');
          pm.expect(jsonData.content).to.be.an('array');
          console.log('Total productos: ' + jsonData.totalElements);
      });
    language: text/javascript
order: 1000
